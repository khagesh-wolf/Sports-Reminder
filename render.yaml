services:
  - type: web
    name: sports-reminder-server
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: CRICKET_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 18
